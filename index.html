<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absolute Carpet Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Prompt',sans-serif;margin:0;background:#f7fbff;color:#333}
header{background:#0F4C81;color:#fff;padding:20px;text-align:center}
.hero{display:flex;flex-wrap:wrap;padding:40px;background:#D9F3FF}
.hero-text{flex:1;min-width:250px}
.hero-form{flex:1;min-width:250px;background:#fff;padding:20px;border-radius:10px}
.section{padding:40px 20px;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:20px;border-radius:10px}
.faq-item{margin:10px 0}
.faq-q{background:#D9F3FF;padding:15px;cursor:pointer}
.faq-a{display:none;padding:15px;background:#fff}
footer{background:#0F4C81;color:#fff;text-align:center;padding:20px}
</style>
</head>
<body>

<header>
<h1>Absolute Carpet Cleaning</h1>
</header>

<section class="hero">
<div class="hero-text">
<h2>Professional Carpet Cleaning</h2>
<p>Deep cleaning for homes and businesses.</p>
</div>
<div class="hero-form">
<h3>Get a Quote</h3>
<input placeholder="Name"><br><br>
<input placeholder="Phone"><br><br>
<button>Submit</button>
</div>
</section>

<section class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">Carpet Cleaning</div>
<div class="card">Sofa Cleaning</div>
<div class="card">Rug Cleaning</div>
</div>
</section>

<section class="section">
<h2>FAQs</h2>
<div class="faq-item">
<div class="faq-q" onclick="this.nextElementSibling.style.display='block'">How long does it take?</div>
<div class="faq-a">Usually 1-2 hours.</div>
</div>
</section>

<footer>
<p>© Absolute Carpet Cleaning</p>
</footer>

</body>
</html>
