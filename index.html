<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Carpet Cleaning Company</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;color:#222;}
.hero {
  height:60vh;
  background:url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?q=80&w=1600') center/cover;
  position:relative;
}
.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}
.hero-content {
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}
.section {padding:50px 20px;}
.form-box {
  background:white;
  max-width:600px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
input, select, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
}
button {
  background:#c9a33c;
  border:none;
  padding:12px;
  width:100%;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>Professional Carpet Cleaning</h1>
    <p>Deep clean. Fast drying. Real results.</p>
  </div>
</section>

<section class="section">
  <div class="form-box">
    <h2>Get a Free Quote</h2>
    <form>
      <input type="text" placeholder="Name">
      <input type="tel" placeholder="Phone">
      <input type="email" placeholder="Email">
      <select>
        <option>Service</option>
        <option>Carpet Cleaning</option>
        <option>Upholstery</option>
      </select>
      <textarea placeholder="Details"></textarea>
      <button>Send Enquiry</button>
    </form>
  </div>
</section>

</body>
</html>
