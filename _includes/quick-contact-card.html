<aside class="quick-contact-card quick-contact-card-plain"{% if include.id %} id="{{ include.id }}"{% endif %} aria-label="Quick contact details">
  <span class="section-kicker">Quick contact</span>
  <h2>{{ include.heading | default: 'Quick local contact' }}</h2>
  <p>{{ include.text | default: 'Call, email or WhatsApp us directly for a fast local reply.' }}</p>
  <div class="contact-mini stack quick-contact-links">
    <a href="tel:{{ site.phone_link | default: site.phone }}"><i class="fa-solid fa-phone"></i> {{ site.phone }}</a>
    <a href="mailto:{{ site.email }}"><i class="fa-solid fa-envelope"></i> {{ site.email }}</a>
    <a href="https://wa.me/{{ site.phone_link | default: site.phone | remove: '+' }}" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> WhatsApp {{ site.contact_name | default: site.business_name }}</a>
  </div>
</aside>
